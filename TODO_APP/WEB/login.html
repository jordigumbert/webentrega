<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/utils.css" />
    <link rel="stylesheet" href="./css/login.css" />

  <body>
    <header>
      <a href="index.html" class="logo"
        ><p>TO-DO<br />'S'</p></a
      >
      <nav>
        <a href="index.html">Inicio</a>
        <a href="login.html">Log In</a>

        <a href="info.html">Info</a>
      </nav>
    </header>

    <main>
      <form class="form_login" id="formulari">
        <h1>Log In page</h1>
        <p>
         Entra tus datos de login 
        </p>
        <p>o <label id="btn_signup" class="signup" href=""> Regístrate aqui </label>, es gratis !</p>

        <input
          name="user_name"
          class="signin"
          type="text"
          placeholder="Nom d'usuari"
        />
        <input
          name="password"
          class="signin"
          type="text"
          placeholder="Contrasenya"
        />
        <input
          name="confirm"
          class="signup oculto"
          type="text"
          placeholder="Repeteix Contrasenya"
        />
        <input
          name="email"
          class="signup oculto"
          type="text"
          placeholder="correu electronic"
        />

        <span>
          <label for="checkbox_input" class="signup oculto">
            Acepto terms i Conds
          </label>
          <input
            id="checkbox_input"
            class="signup oculto"
            type="checkbox"
            class="checkbox_input"
          />
          <span>
            <button id="btn_log_in" class="signup btn_login">LOG IN</button>
           </span>
          <button id="btn_crear_cuenta" class="signup btn_login oculto">
            CREAR CUENTA
          </button>
        </span>
      </form>



      <!-- <img src="./img/index_fons.jpg" /> -->
    </main>
